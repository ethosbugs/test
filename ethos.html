<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ETHOS PLAYER • NEON v3.1</title>
<style>
    :root {
        --neon-cyan: #00f7ff;
        --neon-pink: #ff00ff;
        --bg: #0a0a12;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
        height: 100vh;
        background: var(--bg);
        color: var(--neon-cyan);
        font-family: 'Courier New', monospace;
        overflow: hidden;
        position: relative;
    }

    canvas#matrix { position: fixed; inset: 0; z-index: 1; opacity: 0.65; }
    
    .grid-bg {
        position: fixed;
        inset: 0;
        background: linear-gradient(rgba(0,247,255,0.04) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(0,247,255,0.04) 1px, transparent 1px);
        background-size: 50px 50px;
        animation: gridMove 35s linear infinite;
        z-index: 2;
    }

    header {
        position: relative;
        z-index: 20;
        padding: 18px 40px;
        background: rgba(10,12,25,0.95);
        border-bottom: 2px solid var(--neon-cyan);
        display: flex;
        justify-content: space-between;
        align-items: center;
        box-shadow: 0 0 30px var(--neon-cyan);
    }

    .logo { font-size: 2.3rem; font-weight: 900; letter-spacing: 8px; text-shadow: 0 0 25px var(--neon-pink); }

    .controls { display: flex; gap: 12px; align-items: center; }

    input, button {
        background: rgba(0,0,0,0.8);
        border: 2px solid var(--neon-cyan);
        color: var(--neon-cyan);
        padding: 10px 18px;
        font-family: inherit;
    }
    button:hover {
        background: var(--neon-pink);
        color: #000;
        box-shadow: 0 0 35px var(--neon-pink);
    }

    .cat-bar {
        position: relative;
        z-index: 20;
        padding: 12px 40px;
        background: rgba(12,14,30,0.9);
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        border-bottom: 1px solid rgba(0,247,255,0.2);
    }

    .cat-btn {
        background: transparent;
        border: 2px solid var(--neon-cyan);
        color: var(--neon-cyan);
        padding: 8px 22px;
        cursor: pointer;
        transition: all 0.3s;
    }
    .cat-btn.active, .cat-btn:hover {
        background: var(--neon-cyan);
        color: #000;
        box-shadow: 0 0 25px var(--neon-cyan);
    }

    .games-container {
        position: relative;
        z-index: 10;
        padding: 35px 40px;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
        gap: 25px;
        max-height: calc(100vh - 190px);
        overflow-y: auto;
    }

    .game-card {
        background: rgba(15,18,40,0.9);
        border: 2px solid var(--neon-cyan);
        border-radius: 8px;
        padding: 18px;
        cursor: pointer;
        transition: all 0.4s;
        position: relative;
        overflow: hidden;
    }

    .game-card:hover {
        transform: translateY(-14px) scale(1.04);
        box-shadow: 0 0 55px var(--neon-pink);
        border-color: var(--neon-pink);
    }

    .game-logo {
        width: 100%;
        height: 140px;
        object-fit: contain;
        background: #000;
        border: 1px solid rgba(0,247,255,0.3);
        margin-bottom: 12px;
        border-radius: 6px;
    }

    .game-title {
        font-size: 1.45rem;
        margin-bottom: 8px;
        text-shadow: 0 0 12px currentColor;
    }

    .fav-btn {
        position: absolute;
        top: 12px;
        right: 12px;
        font-size: 1.8rem;
        cursor: pointer;
        z-index: 5;
    }

    .scanline {
        position: fixed;
        inset: 0;
        z-index: 5;
        pointer-events: none;
        background: repeating-linear-gradient(transparent 0px, transparent 4px, rgba(0,255,220,0.06) 4px, rgba(0,255,220,0.06) 8px);
        animation: scan 7s linear infinite;
    }

    @keyframes scan { 0% { transform: translateY(-100%); } 100% { transform: translateY(400%); } }
    @keyframes gridMove { to { background-position: 50px 50px; } }
</style>
</head>
<body>

<canvas id="matrix"></canvas>
<div class="grid-bg"></div>
<div class="scanline"></div>

<header>
    <div class="logo">ETHOS<span style="color:var(--neon-pink)">_PLAYER</span></div>
    <div class="controls">
        <input type="text" id="searchBar" placeholder="BUSCAR JUEGO..." style="width: 260px;">
        <button onclick="openEthosAI()">ETHOS AI</button>
        <button onclick="openSpotify()">SPOTIFY</button>
    </div>
</header>

<div class="cat-bar" id="catBar"></div>
<div class="games-container" id="listaJuegos"></div>

<div style="position:fixed; bottom:20px; right:30px; z-index:30; font-size:1.2rem; opacity:0.7;" id="counter">0 JUEGOS</div>

<script>
// === MATRIX BACKGROUND ===
const canvas = document.getElementById('matrix');
const ctx = canvas.getContext('2d');
let w, h;

function resizeCanvas() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

const chars = "01アイウエオETHOS▓▒░█◆◇";
let drops = Array(Math.floor(w/16)).fill(1);

function drawMatrix() {
    ctx.fillStyle = 'rgba(10,10,18,0.1)';
    ctx.fillRect(0, 0, w, h);
    ctx.fillStyle = '#00f7ff';
    ctx.font = '15px monospace';
    for (let i = 0; i < drops.length; i++) {
        const text = chars[Math.floor(Math.random() * chars.length)];
        ctx.fillText(text, i * 16, drops[i] * 16);
        if (drops[i] * 16 > h && Math.random() > 0.975) drops[i] = 0;
        drops[i]++;
    }
}
setInterval(drawMatrix, 45);

// === TU LÓGICA ORIGINAL (sin cambios) ===
const juegos = juegosRaw.sort((a, b) => a.nombre.localeCompare(b.nombre));

let currentCat = "ALL";
let favoritos = JSON.parse(localStorage.getItem("ethos_favs")) || [];

const contenedor = document.getElementById("listaJuegos");
const searchBar = document.getElementById("searchBar");
const catBar = document.getElementById("catBar");

function toggleFav(nombre, e) {
    e.stopPropagation();
    favoritos = favoritos.includes(nombre) ? favoritos.filter(f => f !== nombre) : [...favoritos, nombre];
    localStorage.setItem("ethos_favs", JSON.stringify(favoritos));
    generarCategorias();
    mostrarJuegos(searchBar.value, false);
}

function generarCategorias() {
    catBar.innerHTML = "";
    let finalTags = [];
    const extraTags = [...new Set(juegos.map(j => j.tag))].sort();
    if (favoritos.length > 0) finalTags.push("FAVS");
    finalTags.push("ALL");
    finalTags = [...finalTags, ...extraTags];

    finalTags.forEach(tag => {
        const btn = document.createElement("button");
        btn.className = `cat-btn ${currentCat === tag ? "active" : ""}`;
        btn.textContent = tag === "FAVS" ? "★ FAVORITOS" : tag === "ALL" ? "SYSTEM_ALL" : tag;
        btn.onclick = () => { currentCat = tag; generarCategorias(); mostrarJuegos(searchBar.value); };
        catBar.appendChild(btn);
    });
}

function mostrarJuegos(filtro = "", animate = true) {
    contenedor.innerHTML = "";

    const filtrados = juegos.filter(j => {
        const matchSearch = j.nombre.toLowerCase().includes(filtro.toLowerCase());
        const matchCat = currentCat === "ALL" || (currentCat === "FAVS" ? favoritos.includes(j.nombre) : j.tag === currentCat);
        return matchSearch && matchCat;
    });

    filtrados.forEach((juego, i) => {
        const div = document.createElement("div");
        div.className = "game-card";

        const logoUrl = juego.logo || "https://via.placeholder.com/300x160/0a0a12/00f7ff?text=ETHOS";

        div.innerHTML = `
            <img src="${logoUrl}" class="game-logo" alt="${juego.nombre}">
            <div class="fav-btn" onclick="toggleFav('${juego.nombre}', event)">${favoritos.includes(juego.nombre) ? '★' : '☆'}</div>
            <div class="game-title">${juego.nombre}</div>
            <div style="opacity:0.7; font-size:0.95rem;">${juego.tag || ''}</div>
        `;

        div.onclick = () => abrirJuego(juego.url);
        contenedor.appendChild(div);
    });

    document.getElementById("counter").textContent = `${filtrados.length} JUEGOS`;
}

function abrirJuego(url) {
    const win = window.open("about:blank", "_blank");
    win.document.write(`<html><head><title>ETHOS GAME</title><style>body{margin:0;background:#000;height:100vh;overflow:hidden;}</style></head><body><iframe src="${url}" width="100%" height="100%" frameborder="0" allowfullscreen></iframe></body></html>`);
    win.document.close();
}

function openEthosAI() {
    window.open("https://script.google.com/macros/s/AKfycbw9TPeZki-pAXzV_S3_OHvpP9fC-5k9yU-UVNfJVSGVor3ls6IvcYvkDGKJg-FH_nwl/exec", "_blank");
}

function openSpotify() {
    window.open("https://open.spotify.com/embed/playlist/4L7KXkQeIQpxWNdXMfBVSM?utm_source=generator&theme=0", "_blank");
}

// Init
searchBar.addEventListener("input", e => mostrarJuegos(e.target.value));
generarCategorias();
mostrarJuegos();
</script>
</body>
</html>
