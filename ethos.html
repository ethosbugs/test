<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ETHOS PLAYER • NEON v3.1</title>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<style>
    :root {
        --neon-green: #00ff9d;
        --neon-white: #ffffff;
        --bg: #0a0a12;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
        height: 100vh;
        background: var(--bg);
        color: var(--neon-green);
        font-family: 'Courier New', monospace;
        overflow: hidden;
        position: relative;
    }
    canvas#matrix { position: fixed; inset: 0; z-index: 1; opacity: 0.35; }

    header {
        position: relative; z-index: 20; padding: 20px 40px;
        background: rgba(10,12,25,0.95); border-bottom: 2px solid var(--neon-green);
        display: flex; justify-content: space-between; align-items: center;
    }
    .logo { font-size: 2.6rem; font-weight: 900; letter-spacing: 4px; display: flex; align-items: center; gap: 8px; }
    .logo::before { content: ">"; color: var(--neon-green); font-size: 3rem; text-shadow: 0 0 20px var(--neon-green); }

    .controls { display: flex; gap: 12px; align-items: center; }
    input, button {
        background: rgba(0,0,0,0.8); border: 2px solid var(--neon-green);
        color: var(--neon-white); padding: 12px 20px; border-radius: 50px;
    }
    button:hover { background: var(--neon-white); color: #000; transform: scale(1.05); }

    .cat-bar { padding: 15px 40px; background: rgba(12,15,30,0.9); display: flex; gap: 10px; flex-wrap: wrap; border-bottom: 1px solid rgba(0,255,157,0.2); overflow-x: auto; }
    .cat-btn {
        background: transparent; border: 2px solid var(--neon-green); color: var(--neon-white);
        padding: 8px 22px; border-radius: 50px; cursor: pointer; transition: all 0.3s; white-space: nowrap;
    }
    .cat-btn.active, .cat-btn:hover { background: var(--neon-green); color: #000; box-shadow: 0 0 20px var(--neon-green); }

    .games-container {
        padding: 40px; 
        display: grid; 
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 25px; 
        max-height: calc(100vh - 220px); 
        overflow-y: auto;
    }
    .game-card {
        background: rgba(15,20,35,0.9); 
        border: 2px solid var(--neon-green);
        border-radius: 16px; 
        padding: 20px; 
        cursor: pointer; 
        transition: all 0.4s; 
        position: relative;
    }
    .game-card:hover { 
        transform: translateY(-12px) scale(1.04); 
        border-color: var(--neon-white); 
    }
    .game-logo {
        width: 100%;
        height: 170px;
        object-fit: contain;
        background: #0f0f1f;
        border: 1px solid rgba(0,255,157,0.2);
        border-radius: 12px;
        margin-bottom: 15px;
        padding: 10px;
    }
    .fav-btn {
        position: absolute;
        top: 15px;
        right: 15px;
        font-size: 1.9rem;
        cursor: pointer;
        z-index: 5;
        color: var(--neon-green);
    }
</style>
</head>
<body>

<canvas id="matrix"></canvas>

<header>
    <div class="logo">ETHOS PLAYER</div>
    <div class="controls">
        <input type="text" id="searchBar" placeholder="BUSCAR JUEGO..." style="width:280px;">
        <button onclick="openEthosAI()">ETHOS AI</button>
        <button onclick="openSpotify()">SPOTIFY</button>
        <button onclick="window.location.href='admin.html'">ADMIN</button>
    </div>
</header>

<div class="cat-bar" id="catBar"></div>
<div class="games-container" id="listaJuegos"></div>
<div style="position:fixed; bottom:25px; right:40px; z-index:30;" id="counter">0 JUEGOS</div>

<script>
// Firebase
const firebaseConfig = {
  apiKey: "AIzaSyBEtMYOTg4fBGyShbULdGCuW76nwlUIfiI",
  authDomain: "ethosgames-a1bc1.firebaseapp.com",
  projectId: "ethosgames-a1bc1",
  storageBucket: "ethosgames-a1bc1.firebasestorage.app",
  messagingSenderId: "877649560017",
  appId: "1:877649560017:web:598a7bc006323627ab60f0"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let juegos = [];
let currentCat = "ALL";
let favoritos = JSON.parse(localStorage.getItem("ethos_favs")) || [];

const contenedor = document.getElementById("listaJuegos");
const searchBar = document.getElementById("searchBar");
const catBar = document.getElementById("catBar");

// Matrix
const canvas = document.getElementById('matrix');
const ctx = canvas.getContext('2d');
let w, h;
function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
resize(); window.addEventListener('resize', resize);
function drawMatrix() {
    ctx.fillStyle = 'rgba(10,12,20,0.15)';
    ctx.fillRect(0, 0, w, h);
    ctx.fillStyle = '#00ff9d';
    ctx.font = '14px monospace';
}
setInterval(drawMatrix, 80);

async function cargarJuegos() {
    try {
        const snapshot = await db.collection("games").get();
        juegos = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })).sort((a,b) => (a.nombre || "").localeCompare(b.nombre || ""));
        generarCategorias();
        mostrarJuegos();
    } catch (e) {
        console.error(e);
        contenedor.innerHTML = `<p style='color:#ff5555; text-align:center;'>Error al cargar juegos</p>`;
    }
}

function generarCategorias() {
    catBar.innerHTML = "";
    let tags = new Set(juegos.map(j => j.category).filter(Boolean));

    // TODOS
    const allBtn = document.createElement("button");
    allBtn.className = `cat-btn ${currentCat === "ALL" ? "active" : ""}`;
    allBtn.textContent = "TODOS";
    allBtn.onclick = () => changeCategory("ALL");
    catBar.appendChild(allBtn);

    tags.forEach(tag => {
        const btn = document.createElement("button");
        btn.className = `cat-btn ${currentCat === tag ? "active" : ""}`;
        btn.textContent = tag.toUpperCase();
        btn.onclick = () => changeCategory(tag);
        catBar.appendChild(btn);
    });

    if (favoritos.length > 0) {
        const favBtn = document.createElement("button");
        favBtn.className = `cat-btn ${currentCat === "FAVS" ? "active" : ""}`;
        favBtn.textContent = "★ FAVORITOS";
        favBtn.onclick = () => changeCategory("FAVS");
        catBar.appendChild(favBtn);
    }
}

function changeCategory(cat) {
    currentCat = cat;
    generarCategorias();
    mostrarJuegos(searchBar.value);
}

function mostrarJuegos(filtro = "") {
    contenedor.innerHTML = "";

    const filtrados = juegos.filter(j => {
        const matchSearch = !filtro || (j.nombre && j.nombre.toLowerCase().includes(filtro.toLowerCase()));
        const matchCat = currentCat === "ALL" || 
                         (currentCat === "FAVS" ? favoritos.includes(j.nombre) : j.category === currentCat);
        return matchSearch && matchCat;
    });

    filtrados.forEach(juego => {
        const div = document.createElement("div");
        div.className = "game-card";
        const logo = juego.logo || `https://via.placeholder.com/300x160/112233/00ff9d?text=${juego.nombre?.substring(0,8) || "GAME"}`;

        div.innerHTML = `
            <img src="${logo}" class="game-logo" alt="${juego.nombre}">
            <div class="fav-btn" onclick="toggleFav('${juego.nombre}', event)">${favoritos.includes(juego.nombre) ? '★' : '☆'}</div>
            <div style="font-size:1.5rem; margin:12px 0; color:white;">${juego.nombre}</div>
            <div style="opacity:0.7;">${juego.category || ''}</div>
        `;

        div.addEventListener('click', function(e) {
            if (!e.target.classList.contains('fav-btn')) {
                abrirJuego(juego.url);
            }
        });

        contenedor.appendChild(div);
    });

    document.getElementById("counter").textContent = `${filtrados.length} JUEGOS`;
}

function toggleFav(nombre, e) {
    e.stopPropagation();
    favoritos = favoritos.includes(nombre) ? favoritos.filter(f => f !== nombre) : [...favoritos, nombre];
    localStorage.setItem("ethos_favs", JSON.stringify(favoritos));
    generarCategorias();
    mostrarJuegos(searchBar.value);
}

function abrirJuego(url) {
    const win = window.open("about:blank", "_blank");
    win.document.write(`<html><body style="margin:0;background:#000;height:100vh"><iframe src="${url}" width="100%" height="100%" frameborder="0" allowfullscreen></iframe></body></html>`);
    win.document.close();
}

function openEthosAI() { window.open("https://script.google.com/macros/s/AKfycbw9TPeZki-pAXzV_S3_OHvpP9fC-5k9yU-UVNfJVSGVor3ls6IvcYvkDGKJg-FH_nwl/exec", "_blank"); }
function openSpotify() { window.open("https://open.spotify.com/embed/playlist/4L7KXkQeIQpxWNdXMfBVSM", "_blank"); }

// Init
searchBar.addEventListener("input", e => mostrarJuegos(e.target.value));
cargarJuegos();
</script>
</body>
</html>
