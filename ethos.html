<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ETHOS PLAYER • NEON v3.1</title>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<style>
    :root {
        --neon-green: #00ff9d;
        --neon-pink: #ff00ff;
        --bg: #0a0a12;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
        height: 100vh;
        background: var(--bg);
        color: var(--neon-green);
        font-family: 'Courier New', monospace;
        overflow: hidden;
        position: relative;
    }
    canvas#matrix { position: fixed; inset: 0; z-index: 1; opacity: 0.4; }
    header {
        position: relative;
        z-index: 20;
        padding: 20px 40px;
        background: rgba(10,12,25,0.95);
        border-bottom: 2px solid var(--neon-green);
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    .logo { font-size: 2.4rem; font-weight: 900; letter-spacing: 6px; }
    .controls { display: flex; gap: 12px; }
    input, button {
        background: rgba(0,0,0,0.8);
        border: 2px solid var(--neon-green);
        color: var(--neon-green);
        padding: 12px 20px;
        border-radius: 50px;
    }
    button:hover {
        background: var(--neon-pink);
        color: #000;
        transform: scale(1.05);
    }
    .games-container {
        position: relative;
        z-index: 10;
        padding: 40px;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 25px;
        max-height: calc(100vh - 180px);
        overflow-y: auto;
    }
    .game-card {
        background: rgba(15,20,35,0.9);
        border: 2px solid var(--neon-green);
        border-radius: 16px;
        padding: 20px;
        cursor: pointer;
        transition: all 0.4s;
    }
    .game-card:hover {
        transform: translateY(-12px) scale(1.04);
        border-color: var(--neon-pink);
        box-shadow: 0 0 40px var(--neon-pink);
    }
    .game-logo {
        width: 100%;
        height: 160px;
        object-fit: contain;
        background: #000;
        border-radius: 12px;
        margin-bottom: 15px;
    }
</style>
</head>
<body>

<canvas id="matrix"></canvas>

<header>
    <div class="logo">ETHOS_<span style="color:var(--neon-pink)">PLAYER</span></div>
    <div class="controls">
        <input type="text" id="searchBar" placeholder="BUSCAR JUEGO..." style="width:280px;">
        <button onclick="openEthosAI()">ETHOS AI</button>
        <button onclick="openSpotify()">SPOTIFY</button>
        <button onclick="window.location.href='admin.html'">ADMIN</button>
    </div>
</header>

<div class="games-container" id="listaJuegos"></div>
<div style="position:fixed; bottom:25px; right:40px; z-index:30; font-size:1.3rem;" id="counter">0 JUEGOS</div>

<script>
// Firebase
const firebaseConfig = {
  apiKey: "AIzaSyBEtMYOTg4fBGyShbULdGCuW76nwlUIfiI",
  authDomain: "ethosgames-a1bc1.firebaseapp.com",
  projectId: "ethosgames-a1bc1",
  storageBucket: "ethosgames-a1bc1.firebasestorage.app",
  messagingSenderId: "877649560017",
  appId: "1:877649560017:web:598a7bc006323627ab60f0"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let juegos = [];
const contenedor = document.getElementById("listaJuegos");
const searchBar = document.getElementById("searchBar");

// Matrix suave
const canvas = document.getElementById('matrix');
const ctx = canvas.getContext('2d');
let w, h;
function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
resize(); window.addEventListener('resize', resize);
function drawMatrix() {
    ctx.fillStyle = 'rgba(10,12,20,0.15)';
    ctx.fillRect(0, 0, w, h);
    ctx.fillStyle = '#00ff9d';
    ctx.font = '14px monospace';
}
setInterval(drawMatrix, 80);

// Cargar Juegos (colección "games")
async function cargarJuegos() {
    try {
        const snapshot = await db.collection("games").get();
        juegos = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        mostrarJuegos();
    } catch (e) {
        console.error(e);
        contenedor.innerHTML = "<p style='color:#ff5555; text-align:center; grid-column:1/-1;'>Error al cargar juegos</p>";
    }
}

function mostrarJuegos(filtro = "") {
    contenedor.innerHTML = "";
    const filtrados = juegos.filter(j => 
        j.nombre && j.nombre.toLowerCase().includes(filtro.toLowerCase())
    );

    filtrados.forEach(juego => {
        const div = document.createElement("div");
        div.className = "game-card";
        const logo = juego.logo || "https://via.placeholder.com/300x160/112233/00ff9d?text=" + (juego.nombre || "GAME");

        div.innerHTML = `
            <img src="${logo}" class="game-logo" alt="${juego.nombre}">
            <div style="font-size:1.5rem; margin:10px 0;">${juego.nombre}</div>
            <div style="opacity:0.7;">${juego.category || juego.tag || ''}</div>
        `;
        div.onclick = () => abrirJuego(juego.url);
        contenedor.appendChild(div);
    });

    document.getElementById("counter").textContent = `${filtrados.length} JUEGOS`;
}

function abrirJuego(url) {
    const win = window.open("about:blank", "_blank");
    win.document.write(`<html><body style="margin:0;background:#000;height:100vh"><iframe src="${url}" width="100%" height="100%" frameborder="0" allowfullscreen></iframe></body></html>`);
    win.document.close();
}

function openEthosAI() { window.open("https://script.google.com/macros/s/AKfycbw9TPeZki-pAXzV_S3_OHvpP9fC-5k9yU-UVNfJVSGVor3ls6IvcYvkDGKJg-FH_nwl/exec", "_blank"); }
function openSpotify() { window.open("https://open.spotify.com/embed/playlist/4L7KXkQeIQpxWNdXMfBVSM", "_blank"); }

// Init
searchBar.addEventListener("input", e => mostrarJuegos(e.target.value));
cargarJuegos();
</script>
</body>
</html>
