<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ETHOS • ADMIN PANEL</title>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<style>
    :root { --neon-green: #00ff9d; --neon-pink: #ff00ff; --bg: #0a0a12; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background: var(--bg); color: var(--neon-green); font-family: 'Courier New', monospace; padding: 30px; }
    h1 { text-align:center; color:var(--neon-pink); margin-bottom:30px; }
    input, button { 
        width: 100%; padding: 14px; margin: 10px 0; 
        background: rgba(0,0,0,0.8); border: 2px solid var(--neon-green); 
        color: var(--neon-green); border-radius: 8px; font-size: 1.1rem;
    }
    button { cursor: pointer; font-weight: bold; }
    button:hover { background: var(--neon-pink); color: #000; }
    .game-item { 
        background: rgba(20,25,40,0.95); padding: 15px; margin: 12px 0; 
        border: 1px solid var(--neon-green); border-radius: 10px; display: flex; justify-content: space-between;
    }
</style>
</head>
<body>
<h1>ETHOS ADMIN PANEL</h1>

<input type="text" id="nombre" placeholder="Nombre del juego">
<input type="text" id="url" placeholder="URL completa del juego">
<input type="text" id="tag" placeholder="Categoría (Acción, Arcade, etc)">
<input type="text" id="logo" placeholder="Link del logo (imagen)">
<button onclick="guardarJuego()">💾 GUARDAR JUEGO</button>

<div style="margin-top:40px;">
    <h2>Juegos en Firebase (<span id="total">0</span>)</h2>
    <div id="listaAdmin"></div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBEtMYOTg4fBGyShbULdGCuW76nwlUIfiI",
  authDomain: "ethosgames-a1bc1.firebaseapp.com",
  projectId: "ethosgames-a1bc1",
  storageBucket: "ethosgames-a1bc1.firebasestorage.app",
  messagingSenderId: "877649560017",
  appId: "1:877649560017:web:598a7bc006323627ab60f0"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let editId = null;

async function guardarJuego() {
    const nombre = document.getElementById("nombre").value.trim();
    const url = document.getElementById("url").value.trim();
    const tag = document.getElementById("tag").value.trim();
    const logo = document.getElementById("logo").value.trim();

    if (!nombre || !url) return alert("Nombre y URL son obligatorios");

    try {
        if (editId) {
            await db.collection("juegos").doc(editId).update({ nombre, url, tag, logo });
        } else {
            await db.collection("juegos").add({ nombre, url, tag, logo, timestamp: Date.now() });
        }
        alert("Guardado correctamente");
        limpiarFormulario();
        cargarJuegosAdmin();
    } catch(e) { console.error(e); alert("Error al guardar"); }
}

function limpiarFormulario() {
    document.getElementById("nombre").value = "";
    document.getElementById("url").value = "";
    document.getElementById("tag").value = "";
    document.getElementById("logo").value = "";
    editId = null;
}

async function cargarJuegosAdmin() {
    const snapshot = await db.collection("juegos").get();
    document.getElementById("total").textContent = snapshot.size;

    const cont = document.getElementById("listaAdmin");
    cont.innerHTML = "";

    snapshot.docs.forEach(doc => {
        const j = doc.data();
        const div = document.createElement("div");
        div.className = "game-item";
        div.innerHTML = `
            <div><strong>${j.nombre}</strong><br><small>${j.tag || ''} — ${j.url.substring(0,60)}...</small></div>
            <div>
                <button onclick="editar('${doc.id}', '${j.nombre}', '${j.url}', '${j.tag||''}', '${j.logo||''}')">EDITAR</button>
                <button onclick="eliminar('${doc.id}')" style="background:#ff3366;">DELETE</button>
            </div>
        `;
        cont.appendChild(div);
    });
}

window.editar = function(id, nombre, url, tag, logo) {
    editId = id;
    document.getElementById("nombre").value = nombre;
    document.getElementById("url").value = url;
    document.getElementById("tag").value = tag;
    document.getElementById("logo").value = logo;
};

window.eliminar = async function(id) {
    if (confirm("Eliminar este juego permanentemente?")) {
        await db.collection("juegos").doc(id).delete();
        cargarJuegosAdmin();
    }
};

cargarJuegosAdmin();
</script>
</body>
</html>
